<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life - Open World Experience</title>
    <link rel="stylesheet" href="./src/style.css">
</head>

<body class="bg-black text-white font-game overflow-hidden">
    <div id="app">
        <!-- Three.js Canvas Container -->
        <div id="canvas-container" class="fixed inset-0 z-0"></div>

        <!-- Main Menu UI -->
        <div id="main-menu"
            class="fixed inset-0 z-10 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity duration-500">
            <div class="flex flex-col items-center animate-fade-in w-full max-w-4xl">
                <img src="./src/assets/logo.png" alt="Life Logo"
                    class="w-64 mb-8 drop-shadow-[0_0_15px_rgba(0,255,136,0.5)]">

                <div class="flex flex-col space-y-4 w-72">
                    <button id="start-game"
                        class="bg-accent hover:bg-accent/80 text-black font-bold py-3 px-8 rounded-sm transform transition hover:scale-105 active:scale-95 uppercase tracking-widest">
                        Start Game
                    </button>
                    <button onclick="toggleOverlay('lifepass-overlay')"
                        class="bg-white/10 hover:bg-white/20 text-white font-semibold py-3 px-8 rounded-sm transform transition hover:scale-105 active:scale-95 uppercase tracking-widest border border-white/20">
                        Life Pass
                    </button>
                    <button onclick="toggleOverlay('store-overlay')"
                        class="bg-white/10 hover:bg-white/20 text-white font-semibold py-3 px-8 rounded-sm transform transition hover:scale-105 active:scale-95 uppercase tracking-widest border border-white/20">
                        Store
                    </button>
                    <button onclick="toggleOverlay('settings-overlay')"
                        class="bg-white/10 hover:bg-white/20 text-white font-semibold py-3 px-8 rounded-sm transform transition hover:scale-105 active:scale-95 uppercase tracking-widest border border-white/20">
                        Settings
                    </button>
                    <button onclick="toggleOverlay('credits-overlay')"
                        class="bg-white/10 hover:bg-white/20 text-white font-semibold py-3 px-8 rounded-sm transform transition hover:scale-105 active:scale-95 uppercase tracking-widest border border-white/20">
                        Credits (m's)
                    </button>
                </div>

                <div class="mt-12 text-white/40 text-xs uppercase tracking-[0.3em]">
                    v0.1 Pre-Alpha | Powered by Three.js & Vite
                </div>
            </div>
        </div>

        <!-- Overlays (Populated by JS Modules) -->
        <div id="lifepass-overlay"
            class="hidden fixed inset-0 z-40 bg-black/95 flex flex-col items-center justify-center p-8"></div>
        <div id="store-overlay"
            class="hidden fixed inset-0 z-40 bg-black/95 flex flex-col items-center justify-center p-8"></div>
        <div id="settings-overlay"
            class="hidden fixed inset-0 z-40 bg-black/95 flex flex-col items-center justify-center p-8"></div>
        <div id="credits-overlay"
            class="hidden fixed inset-0 z-40 bg-black/95 flex flex-col items-center justify-center p-8"></div>
        <div id="inventory-overlay"
            class="hidden fixed inset-0 z-30 bg-black/40 backdrop-blur-md flex flex-col items-center justify-center p-8">
        </div>

        <!-- Bottom HUD -->
        <div id="hud" class="fixed bottom-8 left-8 flex gap-4 items-end pointer-events-none">
            <div class="pointer-events-auto">
                <button id="home-phone-btn" class="w-16 h-16 bg-white/10 backdrop-blur-xl rounded-2xl border border-white/20 flex items-center justify-center text-3xl shadow-2xl hover:bg-white/20 transition-all active:scale-90">
                    🏠
                </button>
            </div>
            
            <div id="stats" class="bg-black/60 backdrop-blur-md p-4 rounded-2xl border border-white/10 text-white flex gap-6">
                <!-- stats content -->
            </div>
        </div>

        <!-- HUD -->
        <div class="fixed top-8 right-8 z-20 flex flex-col items-end space-y-2 pointer-events-none">
            <div
                class="bg-black/60 backdrop-blur border border-white/10 px-4 py-2 rounded text-accent font-bold credits-display shadow-lg">
                0 m's
            </div>
            <div class="text-[8px] text-white/30 uppercase tracking-[0.3em] font-bold text-right">NeoCity Live Protocol
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="hidden fixed inset-0 z-50 bg-black flex flex-col items-center justify-center">
            <div class="w-48 h-1 bg-white/10 rounded-full overflow-hidden">
                <div id="loading-bar" class="w-0 h-full bg-accent transition-all duration-300"></div>
            </div>
            <div class="mt-4 text-accent text-xs uppercase tracking-widest animate-pulse">Loading City Assets...</div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
