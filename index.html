<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life - Expérience Monde Ouvert</title>
    <link rel="stylesheet" href="./src/style.css">
</head>

<body class="bg-black text-white font-game overflow-hidden">
    <div id="app">
        <!-- Three.js Canvas Container -->
        <div id="canvas-container" class="fixed inset-0 z-0"></div>

        <!-- Main Menu UI -->
        <div id="main-menu"
            class="fixed inset-0 z-10 flex flex-col items-center justify-center transition-opacity duration-1000">

            <div class="flex flex-col items-center animate-slide-up w-full max-w-6xl">
                <!-- Branding -->
                <div class="relative mb-20 group">
                    <img src="./src/assets/logo.png" alt="Life Logo"
                        class="w-80 drop-shadow-[0_0_30px_rgba(0,255,136,0.5)] group-hover:scale-105 transition-transform duration-700">
                    <div
                        class="absolute -bottom-4 left-1/2 -translate-x-1/2 text-[10px] uppercase tracking-[0.8em] text-accent/60 font-black">
                        NeoCity Live</div>
                </div>

                <!-- Horizontal Action Bar -->
                <div
                    class="flex items-center gap-4 p-2 bg-white/5 backdrop-blur-3xl border border-white/10 rounded-full shadow-2xl">
                    <button onclick="toggleOverlay('lifepass-overlay')" class="menu-button-horizontal rounded-l-full">
                        Life Pass
                    </button>
                    <button onclick="toggleOverlay('store-overlay')" class="menu-button-horizontal">
                        Boutique
                    </button>

                    <!-- Main CTA -->
                    <button id="start-game-btn" class="relative group">
                        <span class="relative z-10">Commencer la Partie</span>
                        <div
                            class="absolute inset-0 bg-white/20 blur-xl opacity-0 group-hover:opacity-100 transition-opacity">
                        </div>
                    </button>

                    <button onclick="toggleOverlay('settings-overlay')" class="menu-button-horizontal">
                        Paramètres
                    </button>
                    <button onclick="toggleOverlay('credits-overlay')" class="menu-button-horizontal rounded-r-full">
                        Crédits (m's)
                    </button>
                </div>

                <!-- Footer Info -->
                <div class="fixed bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
                    <div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-accent to-transparent"></div>
                    <div class="text-white/30 text-[9px] uppercase tracking-[0.5em] font-bold">
                        v0.0.2 Alpha + | Propulsé par MATHIAS mPlatform
                    </div>
                </div>
            </div>
        </div>

        <!-- Overlays (Populated by JS Modules) -->
        <div id="lifepass-overlay" class="overlay-premium"></div>
        <div id="store-overlay" class="overlay-premium"></div>
        <div id="settings-overlay" class="overlay-premium"></div>
        <div id="credits-overlay" class="overlay-premium"></div>
        <div id="inventory-overlay" class="overlay-premium"></div>

        <!-- Bottom HUD -->
        <div id="hud"
            class="fixed bottom-8 left-8 flex gap-4 items-end pointer-events-none opacity-0 transition-opacity duration-1000">
            <div class="pointer-events-auto">
                <button id="home-phone-btn"
                    class="w-16 h-16 bg-white/10 backdrop-blur-xl rounded-2xl border border-white/20 flex items-center justify-center text-3xl shadow-2xl hover:bg-white/20 transition-all active:scale-90">
                    🏠
                </button>
            </div>

            <div id="stats"
                class="bg-black/60 backdrop-blur-md p-4 rounded-2xl border border-white/10 text-white flex gap-6">
                <!-- stats content -->
            </div>
        </div>

        <!-- Top Right HUD -->
        <div id="top-hud"
            class="fixed top-8 right-8 z-20 flex flex-col items-end space-y-2 pointer-events-none opacity-0 transition-opacity duration-1000">
            <div
                class="bg-black/60 backdrop-blur border border-white/10 px-4 py-2 rounded text-accent font-bold credits-display shadow-lg">
                0 m's
            </div>
            <div class="text-[8px] text-white/30 uppercase tracking-[0.3em] font-bold text-right">Protocole NeoCity Live
                v0.0.2
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen"
            class="hidden fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center transition-opacity duration-500">
            <div class="relative w-64 h-1 bg-white/10 rounded-full overflow-hidden">
                <div id="loading-bar"
                    class="absolute inset-y-0 left-0 bg-accent transition-all duration-300 shadow-[0_0_15px_#00ff88]">
                </div>
            </div>
            <div class="mt-6 text-accent text-[10px] uppercase tracking-[0.6em] font-black animate-pulse text-center">
                Initialisation de NeoCity<br>
                <span class="text-white/40 text-[8px] mt-2 block">Chargement des secteurs haute-fidélité</span>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
